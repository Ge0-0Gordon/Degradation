seed: 42
output_root: runs

data:
  root: ./data
  year: "2012"
  train_split: train
  val_split: val
  download: false
  transform:
    base_size: 520
    crop_size: 480
    hflip_prob: 0.5
    scale_min: 0.5
    scale_max: 2.0
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]

train:
  device: cuda
  epochs: 40
  batch_size: 4
  val_batch_size: 4
  num_workers: 4
  amp: true
  eval_every: 1

optim:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  name: poly
  power: 0.9

loss:
  ignore_index: 255
  ce_weight: 1.0
  aux_weight: 0.4
  boundary_weight: 0.0

run_name: deeplabv3_baseline

model:
  name: deeplabv3_resnet50
  num_classes: 21
  pretrained: true
  aux_loss: true

degradation:
  enable: false
  prob: 0.0
  types: [gaussian_noise, motion_blur, jpeg]
  min_severity: 1
  max_severity: 5
  one_of: true
